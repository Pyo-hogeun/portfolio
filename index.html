<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/style.css">
  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <title>Portfolio - 표호근</title>

</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-title">
      <p class="main">
        web puplisher <br />
        & front-end developer<br />
        표호근<br />
        Pyo hogeun
      </p>
      <p class="description">
        <span class="title">skilled in</span><br />
        HTML, CSS, JS<br />
        React, Vue<br />
        Git, Figma<br />
        ... and more
      </p>
    </div>
  </section>

  <!-- Portfolio -->
  <section class="container">
    <div class="grid">

      <a href="https://example.com" target="_blank" class="card">
        <div class="thumb-wrap">
          <img class="thumbnail" src="https://picsum.photos/400/300?1" loading="lazy" />
        </div>
        <div class="card-body">
          <div class="title">프로젝트 A</div>
          <div class="desc">반응형 웹 퍼블리싱, 인터랙션 구현</div>
          <div class="meta">2025.01 | 3인 참여 | HTML, CSS, JS</div>
        </div>
      </a>

      <a href="https://example.com" target="_blank" class="card">
        <div class="thumb-wrap">
          <img class="thumbnail" src="https://picsum.photos/400/300?2" loading="lazy" />
        </div>
        <div class="card-body">
          <div class="title">프로젝트 B</div>
          <div class="desc">패럴럭스 + GSAP 애니메이션</div>
          <div class="meta">2025.02 | 2인 참여 | GSAP</div>
        </div>
      </a>

      <a href="https://example.com" target="_blank" class="card">
        <div class="thumb-wrap">
          <img class="thumbnail" src="https://picsum.photos/400/300?3" loading="lazy" />
        </div>
        <div class="card-body">
          <div class="title">프로젝트 C</div>
          <div class="desc">웹 접근성 개선 및 UI 리뉴얼</div>
          <div class="meta">2025.03 | 4인 참여 | SEO</div>
        </div>
      </a>

    </div>
  </section>

  <!-- Bottom Parallax -->
  <section class="parallax-section">
    <div class="parallax-bg"></div>
  </section>


  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Hero Parallax
    gsap.to('.hero-bg', {
      yPercent: 20,
      ease: 'none',
      scrollTrigger: {
        trigger: '.hero',
        start: 'top top',
        end: 'bottom top',
        scrub: true
      }
    });

    // Bottom Parallax
    gsap.to('.parallax-bg', {
      yPercent: 25,
      ease: 'none',
      scrollTrigger: {
        trigger: '.parallax-section',
        start: 'top bottom',
        end: 'bottom top',
        scrub: true
      }
    });

    // Card 등장 애니메이션
    gsap.from('.card', {
      opacity: 0,
      y: 50,
      duration: 0.8,
      stagger: 0.2,
      scrollTrigger: {
        trigger: '.grid',
        start: 'top 80%'
      }
    });

  </script>

</body>
</html>
